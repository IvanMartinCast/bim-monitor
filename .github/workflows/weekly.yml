name: BIM Monitor Weekly

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run script
      run: |
        python src/main.py

    - name: Commit updated Excel
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add data/
        git commit -m "Actualización semanal BIM" || echo "No changes"
        git push
