name: BIM Monitor Weekly

on:
  schedule:
    - cron: '0 6 * * 1'  # lunes 06:00 UTC
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run script
      run: |
        python src/main.py

    - name: Commit updated Excel
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        # 🔥 Forzar cambio para que Git detecte modificaciones
        echo "update $(date)" >> data/force_change.txt

        # Añadir todos los cambios
        git add -A

        # Mostrar cambios (debug)
        git status

        # Commit (si hay cambios)
        git commit -m "Actualización BIM $(date)" || echo "No changes"

        # Push
        git push
